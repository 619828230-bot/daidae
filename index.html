<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>关注公众号获取更多</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 350px;
            width: 100%;
        }
        .title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }
        .qrcode {
            width: 200px;
            height: 200px;
            border: 8px solid #f0f0f0;
            border-radius: 12px;
            margin: 0 auto 20px;
            display: block;
        }
        .tip {
            font-size: 13px;
            color: #999;
            line-height: 1.6;
            background: #f8f8f8;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            background: #07c160;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 15px;
            margin-top: 15px;
            font-weight: 500;
        }
        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">扫码关注公众号</div>
        <div class="subtitle">获取更多干货内容</div>
        
        <img src="qrcode.jpg" alt="公众号二维码" class="qrcode" id="qrcode">
        
        <a href="weixin://" class="btn" onclick="openWechat()">打开微信扫一扫</a>
        
        <div class="tip">
            💡 操作提示：<br>
            1. 长按上方二维码保存图片<br>
            2. 打开微信 → 扫一扫 → 从相册选择<br>
            或点击上方按钮直接打开微信
        </div>
    </div>

    <script>
        // 尝试自动唤起微信
        function openWechat() {
            window.location.href = 'weixin://';
            setTimeout(function() {
                alert('请手动打开微信，使用扫一扫功能');
            }, 2000);
        }
        
        // 页面加载时尝试自动跳转
        window.onload = function() {
            // 检测是否在微信内打开
            var ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf('micromessenger') > -1) {
                // 已经在微信里了，不用跳转
            }
        };
    </script>
</body>
</html>
